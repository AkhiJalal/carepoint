{% extends "base.html" %}
{% block title %}Add Staff{% endblock %}
{% block page_title %}Add Staff Member{% endblock %}
{% block content %}
<div class="form-page fade-up">
  <div class="pg-hdr">
    <div><h2>Add Staff Member</h2><p>Register a new doctor, nurse or admin</p></div>
    <a href="/staff" class="btn btn-glass btn-sm"><i class="fa fa-arrow-left"></i> Back</a>
  </div>
  <form method="POST">
    <div class="form-card">
      <div class="form-section-hdr"><i class="fa fa-user-md"></i> Staff Details</div>
      <div class="form-grid-2">
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Full Name *</label>
          <input class="form-control" name="name" required placeholder="Dr. John Doe">
        </div>
        <div class="form-group">
          <label class="form-label">Role *</label>
          <select class="form-control" name="role" required>
            <option value="">Select role</option>
            <option value="doctor">Doctor</option>
            <option value="nurse">Nurse</option>
            <option value="admin">Admin</option>
            <option value="pharmacist">Pharmacist</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Specialization</label>
          <input class="form-control" name="specialization" placeholder="e.g. Cardiology">
        </div>
        <div class="form-group">
          <label class="form-label">Username *</label>
          <input class="form-control" name="username" required placeholder="login username">
        </div>
        <div class="form-group">
          <label class="form-label">Password *</label>
          <input class="form-control" type="password" name="password" required placeholder="Set password">
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Contact</label>
          <input class="form-control" name="contact" placeholder="+233 XX XXX XXXX">
        </div>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary"><i class="fa fa-user-plus"></i> Add Staff</button>
      <a href="/staff" class="btn btn-glass">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
