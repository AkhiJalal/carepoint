<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Login — CarePoint</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="flash-wrap">
{% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
  <div class="flash flash-{{ cat }}"><i class="fa fa-exclamation-circle"></i> {{ msg }}</div>
  {% endfor %}
{% endwith %}
</div>

<div class="login-page" style="position:relative;z-index:1">

  <!-- Animated particles -->
  <div class="login-particles" id="particles"></div>

  <div class="login-card">
    <div class="login-icon"><i class="fa fa-user-shield"></i></div>
    <div class="login-title">Staff Login</div>
    <div class="login-sub">Sign in to access the CarePoint dashboard</div>

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-icon-wrap">
          <i class="fa fa-user"></i>
          <input class="form-control" type="text" name="username" placeholder="Enter your username" required autofocus>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-icon-wrap">
          <i class="fa fa-lock"></i>
          <input class="form-control" type="password" name="password" id="pwInput" placeholder="Enter your password" required>
          <button type="button" id="pwToggle" onclick="togglePw()" style="position:absolute;right:.85rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:.85rem">
            <i class="fa fa-eye" id="pwIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-full" style="justify-content:center;margin-top:.5rem;padding:.8rem">
        <i class="fa fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <div style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border);text-align:center">
      <p style="font-size:.8rem;color:var(--text3);margin-bottom:.75rem">Not a staff member?</p>
      <a href="/patient/login" class="btn btn-glass w-full" style="justify-content:center">
        <i class="fa fa-user"></i> Patient Portal
      </a>
    </div>

    <a href="/" class="login-back" style="display:flex;align-items:center;gap:.4rem;justify-content:center;margin-top:1rem">
      <i class="fa fa-arrow-left"></i> Back to home
    </a>
  </div>
</div>

<style>
.login-particles{position:fixed;inset:0;pointer-events:none;z-index:0}
.particle{
  position:absolute;width:3px;height:3px;background:var(--blue);border-radius:50%;
  animation:particleFloat linear infinite;opacity:0;
}
@keyframes particleFloat{
  0%{transform:translateY(100vh) translateX(0);opacity:0}
  10%{opacity:.6}
  90%{opacity:.3}
  100%{transform:translateY(-10vh) translateX(calc(var(--dx)*80px));opacity:0}
}
</style>

<script>
function togglePw(){
  const i = document.getElementById('pwInput');
  const icon = document.getElementById('pwIcon');
  i.type = i.type === 'password' ? 'text' : 'password';
  icon.className = i.type === 'password' ? 'fa fa-eye' : 'fa fa-eye-slash';
}

// Generate floating particles
const container = document.getElementById('particles');
for(let i = 0; i < 30; i++){
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random()*100 + '%';
  p.style.animationDuration = (8 + Math.random()*12) + 's';
  p.style.animationDelay = (Math.random()*10) + 's';
  p.style.setProperty('--dx', (Math.random()*2-1).toString());
  p.style.opacity = Math.random()*0.5;
  container.appendChild(p);
}

// Auto-dismiss flashes
setTimeout(() => {
  document.querySelectorAll('.flash').forEach(f => {
    f.style.opacity='0';f.style.transform='translateX(20px)';
    setTimeout(()=>f.remove(),400);
  });
}, 4000);
</script>
</body>
</html>
