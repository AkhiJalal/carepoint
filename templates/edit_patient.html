{% extends "base.html" %}
{% block title %}Edit Patient{% endblock %}
{% block page_title %}Edit Patient{% endblock %}
{% block content %}
<div class="form-page fade-up">
  <div class="pg-hdr">
    <div><h2>Edit — {{ patient.name }}</h2><p>Update patient information</p></div>
    <a href="/patients/{{ patient.id }}" class="btn btn-glass btn-sm"><i class="fa fa-arrow-left"></i> Back</a>
  </div>
  <form method="POST">
    <div class="form-card">
      <div class="form-section-hdr"><i class="fa fa-user"></i> Basic Information</div>
      <div class="form-grid-2">
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Full Name *</label>
          <input class="form-control" name="name" value="{{ patient.name }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Age</label>
          <input class="form-control" name="age" type="number" value="{{ patient.age or '' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Gender</label>
          <select class="form-control" name="gender">
            <option value="">Select</option>
            {% for g in ['Male','Female','Other'] %}
            <option {% if patient.gender == g %}selected{% endif %}>{{ g }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Blood Group</label>
          <select class="form-control" name="blood_group">
            <option value="">Select</option>
            {% for b in ['A+','A-','B+','B-','AB+','AB-','O+','O-'] %}
            <option {% if patient.blood_group == b %}selected{% endif %}>{{ b }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Contact</label>
          <input class="form-control" name="contact" value="{{ patient.contact or '' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-control" name="email" value="{{ patient.email or '' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Emergency Contact</label>
          <input class="form-control" name="emergency_contact" value="{{ patient.emergency_contact or '' }}">
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Address</label>
          <input class="form-control" name="address" value="{{ patient.address or '' }}">
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Medical History</label>
          <textarea class="form-control" name="medical_history">{{ patient.medical_history or '' }}</textarea>
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Allergies</label>
          <textarea class="form-control" name="allergies" rows="2">{{ patient.allergies or '' }}</textarea>
        </div>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary"><i class="fa fa-save"></i> Save Changes</button>
      <a href="/patients/{{ patient.id }}" class="btn btn-glass">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
